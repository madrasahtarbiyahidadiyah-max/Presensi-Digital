name: CI for Presensi-Digital

# Memicu workflow setiap kali ada push atau pull request ke branch "main"
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Mengambil kode dari repositori Anda
    - name: Checkout repository
      uses: actions/checkout@v4

    # Menjalankan perintah sederhana agar workflow berhasil tanpa mencari package.json
    - name: Cek Status Repositori
      run: |
        echo "Workflow GitHub Actions berhasil berjalan!"
        echo "Menampilkan daftar file yang ada di repositori saat ini:"
        ls -la
